<html lang="en">

<style>

// === MAIN APP (single useReducer to avoid batching issues) ===
const init={phase:'loading',data:DEF,tab:'overview',sync:{s:'none',m:'',u:''}};
function reducer(st,a){
  switch(a.type){
    case 'LOADED':return{...st,phase:'app',data:a.data,sync:a.sync||st.sync};
    case 'SETUP':return{...st,phase:'setup',data:a.data||st.data};
    case 'SET_DATA':return{...st,data:a.data};
    case 'SET_TAB':return{...st,tab:a.tab};
    case 'SET_SYNC':return{...st,sync:{...st.sync,...a.sync}};
    case 'SET_PHASE':return{...st,phase:a.phase};
    default:return st;
  }
}

  const[st,dispatch]=useReducer(reducer,init);
  const timer=useRef(null);

    (async()=>{
      const tk=G.tk(),gid=G.gid();

          dispatch({type:'LOADED',data:d,sync:{s:'ok',m:'Synced',u}});

  }else if(tab==='accounts'){content=sp(e(Sec,sP('Accounts',COL.accounts,'accounts',{name:'',type:'Everyday',balance:0},[{key:'name',ph:'Account name',grow:true},{key:'type',opts:AT},{key:'balance',am:true}])))
